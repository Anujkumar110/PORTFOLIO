<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Anuj Kumar — Developer Portfolio</title>
    <meta name="description" content="Personal portfolio of Anuj Kumar — a passionate Developer building beautiful, performant applications." />
    <meta name="keywords" content="portfolio, developer, app development" />
    <meta name="author" content="Anuj Kumar" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Anuj Kumar — Developer Portfolio" />
    <meta property="og:description" content="Passionate Developer crafting beautiful experiences." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourportfolio.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Name — Developer Portfolio" />
    <meta name="twitter:description" content="Passionate Full Stack Developer crafting beautiful web experiences." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Theme: prevent flash of wrong theme -->
    <script>
      (function () {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
